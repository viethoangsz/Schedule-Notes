name: schedule_notes
description: A personal notes and schedule management app - works completely offline.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_local_notifications: ^17.2.4
  intl: ^0.19.0
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8
  timezone: ^0.9.4
  file_picker: ^8.1.2
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
